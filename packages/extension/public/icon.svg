<svg xmlns="http://www.w3.org/2000/svg" viewBox="70 60 420 420">
  <defs>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8369A" />
      <stop offset="100%" stop-color="#6320EE" />
    </linearGradient>
    
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#2979FF" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFE000" />
      <stop offset="100%" stop-color="#FF7B00" />
    </linearGradient>

    <linearGradient id="glassReflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <filter id="shadowBase" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="10" stdDeviation="12" flood-color="#000714" flood-opacity="0.25" />
    </filter>
    <filter id="shadowFloat" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="6" dy="18" stdDeviation="16" flood-color="#000714" flood-opacity="0.35" />
    </filter>
  </defs>

  <g filter="url(#shadowBase)">
    <rect x="120" y="140" width="220" height="220" rx="55" transform="rotate(25, 230, 250)" fill="url(#mcpGrad)" />
    <rect x="120" y="140" width="220" height="220" rx="55" transform="rotate(25, 230, 250)" fill="none" stroke="url(#glassReflection)" stroke-width="2" />
  </g>

  <g filter="url(#shadowFloat)">
    <rect x="130" y="190" width="260" height="170" rx="24" fill="url(#browserGrad)" />
    <rect x="130" y="190" width="260" height="170" rx="24" fill="url(#glassReflection)" />
    <rect x="131" y="191" width="258" height="168" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" />

    <circle cx="156" cy="216" r="6" fill="#ffffff" fill-opacity="0.95" />
    <circle cx="176" cy="216" r="6" fill="#ffffff" fill-opacity="0.6" />
    <circle cx="196" cy="216" r="6" fill="#ffffff" fill-opacity="0.3" />

    <rect x="146" y="240" width="150" height="12" rx="6" fill="#ffffff" fill-opacity="0.3" />
    <rect x="146" y="265" width="100" height="8" rx="4" fill="#ffffff" fill-opacity="0.15" />
    <rect x="146" y="285" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.15" />
    <rect x="146" y="305" width="80" height="8" rx="4" fill="#ffffff" fill-opacity="0.15" />
  </g>

  <g filter="url(#shadowFloat)">
    <path d="M 360 150 A 65 65 0 1 1 310 240" fill="none" stroke="url(#accentGrad)" stroke-width="26" stroke-linecap="round" />
    <path d="M 360 150 A 65 65 0 1 1 310 240" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.4" transform="translate(-1.5, -1.5)" />
  </g>
</svg>